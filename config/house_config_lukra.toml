# House configuration for Lukra / Tobi's house (1993, no cellar).
# Source: source_data/tobis-haus.md
#
# Untergeschoss -> [[ground_floor.room]] (slab on ground; buffer = unheated zone below)
# Obergeschoss  -> [[first_floor.room]]  (loses heat up through insulated ceiling into cold attic)
#
# exterior_wall_area_m2 = estimated gross outside-facing wall (length × 2.4 m); refine with plan.
# window_area_m2        = from tobis-haus.md (doors with glazing counted as window area).
# heater_nominal_power_w = panel output @ 55 °C flow (EN 442 Typ 22/33 lengths converted).
#   Küche / Bäder: Fußbodenheizung im Rücklauf not modeled separately.
#
# Use via HOUSE_CONFIG, e.g.:
#   HOUSE_CONFIG=house_config_lukra.toml .venv/bin/python run_simulation.py full_year

[location]
label = "Gifhorn, Niedersachsen"
latitude = 52.489
longitude = 10.546

[building]
footprint_length_m = 12.6   # Außenmaß laut tobis-haus.md
footprint_width_m  = 11.0
ceiling_height_m   = 2.4    # assumed (OG Drempel 90 cm not modeled separately)
wall_area_fraction = 0.13

[envelope]
# 24 cm Poroton + 6 cm Kerndämmung + Verblender (~1993, nachträglich gedämmt)
wall_u    = 0.40
# EG Fenster/Türen Ug 0.6; Uw ≈ 1.0–1.2 with frame (OG teils älter — Durchschnitt)
window_u  = 1.10
floor_u   = 0.45   # keine Kellerdecke — Decke auf Erdreich / unbeheizte Zone
ceiling_u = 0.25   # 14 cm Glaswolle oberste Geschossdecke → unbeheizter Dachboden

[design]
design_outdoor_temp_c = -12.0

[operation]
heating_season_start = "10-01"
heating_season_end   = "05-15"

[ventilation]
air_changes_per_hour_open = 10.0
air_changes_per_hour_baseline = 0.35   # Baujahr 1993, teils neue Fenster

[hot_water]
# ~11 m³/month gesamt (tobis-haus.md); profile still from default JSON until a
# house-specific water_monthly file is wired up.
hot_fraction_winter = 0.45
hot_fraction_summer = 0.30
summer_months = [5, 6, 7, 8, 9]
cold_inlet_c = 10.0
target_temp_c = 55.0
dhw_flow_temp_c = 55.0

[buffer.basement]
# No cellar — buffer approximates cool ground / under-slab inertia
outdoor_high_c = 18.0
buffer_high_c  = 14.0
outdoor_low_c  = -10.0
buffer_low_c   = 8.0
inertia_hours  = 72.0

[buffer.attic]
# Unbeheizter Dachboden
outdoor_high_c = 18.0
buffer_high_c  = 16.0
outdoor_low_c  = -10.0
buffer_low_c   = 2.0
inertia_hours  = 8.0

# ===== Erdgeschoss ==========================================================

