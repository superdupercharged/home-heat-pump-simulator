# House configuration for THIS house (from docs/raumbuch_heat_pump.md).
#
# Untergeschoss -> [[ground_floor.room]] (loses heat down into the basement)
# Obergeschoss  -> [[first_floor.room]]  (loses heat up into the attic)
#
# exterior_wall_area_m2 = Außenwandlänge * ceiling_height (2.4 m).
# window_area_m2        = Fensterfläche from the Raumbuch.
# floor_area_m2         = Raumgröße (length * width).
#
# NOTE: all heater_nominal_power_w values are given as output @ 55 °C flow
# (heater_rating_flow_c = 55). The Kinderzimmer 1/2/3 and Schlafzimmer values
# are real (1258 W @ 55 °C; KiZi2 interpolated by length 1.3/1.6). The rest are
# ESTIMATES converted from rough ΔT50 guesses via ((52.5 - T_room)/50)^1.3, so
# refine them later against real radiator datasheets. Not yet used in the energy
# calc (reserved for a future radiator-adequacy check).
#
# Use this file instead of the default via the HOUSE_CONFIG env var, e.g.:
#   HOUSE_CONFIG=house_config_rehgraeble.toml .venv/bin/python run_simulation.py

[building]
footprint_length_m = 13.72
footprint_width_m  = 9.95
ceiling_height_m   = 2.4
# Heated floor area per level from the Raumbuch ≈ 85.7 m² (UG) / 85.8 m² (OG).
# Share of gross footprint taken up by walls/partitions. A wall take-off for
# this house (30 cm outer, 20 cm inner) gives ~12.5-13 %. Net floor = brutto *
# (1 - wall_area_fraction); the remainder beyond modeled rooms becomes the
# auto circulation proxy (floor/ceiling + infiltration losses).
wall_area_fraction = 0.13

[envelope]
wall_u    = 0.87   # outer walls (given)
window_u  = 1.40   # double-glazed PVC windows ~2005 (Uw typically 1.3–1.5)
floor_u   = 0.40   # ground-floor floor -> basement (estimate)
ceiling_u = 0.30   # first-floor ceiling -> attic (estimate)

[design]
design_outdoor_temp_c = -12.0

[operation]
heating_season_start = "10-15"
heating_season_end   = "05-15"

[ventilation]
# Window airing (Stoßlüften): while a window is wide open the room exchanges
# this many air changes per hour. Per-room daily airing time is set via
# airing_minutes_per_day on each room (default 0 = no airing). Ventilation loss
# scales with (T_room - T_outside), i.e. it grows with the outdoor ΔT.
air_changes_per_hour_open = 10.0
# Baseline infiltration: continuous (24/7) leakage through the building envelope,
# whole house. Older 2005 house with PVC double glazing ≈ 0.2–0.4 /h.
air_changes_per_hour_baseline = 0.4

[hot_water]
# Domestic hot water (DHW). Monthly water use is read from the "Wasser" sheet of
# source_data/Strom_Wasser_Verbrauch.xlsx; a seasonal fraction of it is heated.
# In summer the total includes garden/play water, so the hot share is lower.
hot_fraction_winter = 0.45
hot_fraction_summer = 0.30
summer_months = [5, 6, 7, 8, 9]
cold_inlet_c = 10.0      # cold mains water inlet temperature
target_temp_c = 55.0     # DHW delivery temperature
dhw_flow_temp_c = 55.0   # heat-pump flow temp to charge the DHW tank (for COP)

[buffer.basement]
outdoor_high_c = 18.0
buffer_high_c  = 18.0
outdoor_low_c  = -10.0
buffer_low_c   = 5.0
inertia_hours  = 48.0

[buffer.attic]
outdoor_high_c = 18.0
buffer_high_c  = 18.0
outdoor_low_c  = -10.0
buffer_low_c   = 5.0
inertia_hours  = 12.0

