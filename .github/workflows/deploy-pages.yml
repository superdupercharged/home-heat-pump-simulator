name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "**/*.py"
      - "config/**"
      - "docs/index.html"
      - "docs/style.css"
      - "docs/build-id.js"
      - "source_data/**"
      - "requirements.txt"
      - "build_docs.py"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch weather history (all houses)
        run: |
          for cfg in config/house_config_*.toml; do
            echo "Fetching weather for $(basename "$cfg") …"
            HOUSE_CONFIG=$(basename "$cfg") python weather.py fetch_history
          done

      - name: Build site
        run: python build_docs.py

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./docs
          commit_message: "Deploy site (${{ github.sha }})"
